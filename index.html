<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Premium - Pencak Silat</title>
    
    <!-- Memuat Tailwind CSS untuk Desain Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat Babel untuk menerjemahkan React di dalam Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Mengonfigurasi Import Map untuk React (ES Modules) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
        }
    }
    </script>
    
    <style>
        /* Gaya khusus untuk memastikan hasil cetak rapi dalam orientasi Landscape */
        @media print {
            @page { 
                size: landscape; 
                margin: 1cm; 
            }
            body { 
                background-color: white !important; 
                color: black !important;
            }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:flex { display: flex !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:m-0 { margin: 0 !important; }
            
            /* Mengatur kontras warna tabel agar hitam putih rapi saat dicetak */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
            }
            th, td {
                border: 1px solid black !important;
                color: black !important;
                padding: 6px !important;
                font-size: 12px !important;
            }
            th {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">
    
    <!-- Wadah utama untuk Aplikasi React -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, doc, setDoc, writeBatch, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        // Konfigurasi Database Firebase Pencak Silat 2026
        const firebaseConfig = {
            apiKey: "AIzaSyCOyxeKmdRHfLYtSKdWvS7mxkkeZaUvW4k",
            authDomain: "pencaksilat2026.firebaseapp.com",
            projectId: "pencaksilat2026",
            storageBucket: "pencaksilat2026.firebasestorage.app",
            messagingSenderId: "114867206597",
            appId: "1:114867206597:web:75332626ce01c26a15b3ac",
            measurementId: "G-W6JZPS393P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pencaksilat2026';

        function SmartLogo({ className }) {
            const primarySrc = "https://i.ibb.co.com/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png";
            const alternateSrc = "https://i.ibb.co.com/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png";
            
            const [src, setSrc] = useState(primarySrc);
            const [loading, setLoading] = useState(true);
            const [retryCount, setRetryCount] = useState(0);

            const handleImageError = () => {
                const nextSrc = src.includes(".co.com") ? alternateSrc : primarySrc;
                if (retryCount < 10) {
                    setTimeout(() => {
                        setSrc(nextSrc + "?retry=" + retryCount);
                        setRetryCount(prev => prev + 1);
                    }, 1500);
                } else {
                    setSrc(alternateSrc);
                    setLoading(false);
                }
            };

            return (
                <div className="relative inline-block overflow-hidden rounded-full bg-amber-50/30">
                    {loading && (
                        <div className="absolute inset-0 flex items-center justify-center">
                            <div className="w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    )}
                    <img 
                        src={src} 
                        alt="Logo Pencak Silat Resmi" 
                        className={`${className} ${loading ? 'opacity-0 scale-95' : 'opacity-100 scale-100'} transition-all duration-300 object-cover`}
                        onLoad={() => setLoading(false)}
                        onError={handleImageError}
                    />
                </div>
            );
        }

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(() => localStorage.getItem('silat_auth') !== null);
            const [isViewerMode, setIsViewerMode] = useState(() => localStorage.getItem('silat_auth') === 'viewer');
            
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('entri');
            
            const [students, setStudents] = useState([]);
            const [attendance, setAttendance] = useState({});
            
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));

            const [coachName, setCoachName] = useState(() => localStorage.getItem('silat_coach') || 'ALFIAN, S.Pd.');
            const [coachNip, setCoachNip] = useState(() => localStorage.getItem('silat_nip') || '');
            const [establishedIn, setEstablishedIn] = useState(() => localStorage.getItem('silat_established') || 'Manokwari');

            const [newStudentName, setNewStudentName] = useState('');
            const [newStudentKelas, setNewStudentKelas] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editName, setEditName] = useState('');
            const [editKelas, setEditKelas] = useState('');
            const [showHapusSemuaWarning, setShowHapusSemuaWarning] = useState(false);

            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);

            const playWelcomeGreeting = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Menghentikan suara yang sedang berjalan jika ada
                    const utterance = new SpeechSynthesisUtterance("Selamat datang! Terima kasih telah menggunakan aplikasi.");
                    utterance.lang = "id-ID";
                    utterance.volume = 1.0; // Volume maksimal otomatis
                    utterance.rate = 0.95;  // Kecepatan membaca natural
                    utterance.pitch = 1.0;

                    // Menggunakan suara berbahasa Indonesia lokal
                    const voices = window.speechSynthesis.getVoices();
                    const idVoice = voices.find(v => v.lang.startsWith('id') || v.lang.startsWith('ID'));
                    if (idVoice) utterance.voice = idVoice;

                    window.speechSynthesis.speak(utterance);
                }
            };

            // Memicu suara otomatis pada interaksi pertama jika pengguna sudah terautentikasi (auto-login)
            useEffect(() => {
                if (isAuthenticated) {
                    const handleFirstInteraction = () => {
                        playWelcomeGreeting();
                        document.removeEventListener('click', handleFirstInteraction);
                    };
                    document.addEventListener('click', handleFirstInteraction);
                    return () => document.removeEventListener('click', handleFirstInteraction);
                }
            }, [isAuthenticated]);

            const handleRefresh = () => {
                setIsRefreshing(true);
                setTimeout(() => setIsRefreshing(false), 800);
            };

            useEffect(() => {
                const manifest = {
                    name: "Absensi Pencak Silat",
                    short_name: "Silat App",
                    start_url: window.location.href,
                    display: "standalone",
                    background_color: "#ffffff",
                    theme_color: "#f59e0b",
                    icons: [{
                        src: "https://i.ibb.co/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png",
                        sizes: "192x192",
                        type: "image/png"
                    }, {
                        src: "https://i.ibb.co/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png",
                        sizes: "512x512",
                        type: "image/png"
                    }]
                };
                const stringManifest = JSON.stringify(manifest);
                const blob = new Blob([stringManifest], {type: 'application/json'});
                const manifestURL = URL.createObjectURL(blob);
                
                let link = document.querySelector('link[rel="manifest"]');
                if (!link) {
                    link = document.createElement('link');
                    link.rel = 'manifest';
                    document.head.appendChild(link);
                }
                link.href = manifestURL;

                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            useEffect(() => {
                localStorage.setItem('silat_coach', coachName);
            }, [coachName]);

            useEffect(() => {
                localStorage.setItem('silat_nip', coachNip);
            }, [coachNip]);

            useEffect(() => {
                localStorage.setItem('silat_established', establishedIn);
            }, [establishedIn]);

            const formattedCurrentDate = new Date().toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (err) {
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Firebase Auth Error:", error);
                    }
                };
                initAuth();
                
                const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const unsubStudents = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), (snapshot) => {
                            const studentData = [];
                            snapshot.forEach(doc => studentData.push({ 
                                id: doc.id, 
                                name: doc.data().name,
                                kelas: doc.data().kelas || '-'
                            }));
                            studentData.sort((a, b) => a.name.localeCompare(b.name));
                            setStudents(studentData);
                        });

                        const unsubAttendance = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snapshot) => {
                            const attendanceData = {};
                            snapshot.forEach(doc => {
                                attendanceData[doc.id] = doc.data().status;
                            });
                            setAttendance(attendanceData);
                        });

                        return () => {
                            unsubStudents();
                            unsubAttendance();
                        };
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username.trim().toLowerCase() === 'siswa' && password === 'silat2026') {
                    setIsAuthenticated(true);
                    setIsViewerMode(false);
                    localStorage.setItem('silat_auth', 'admin');
                    setLoginError('');
                    setActiveTab('entri');
                    setTimeout(() => playWelcomeGreeting(), 100);
                } else {
                    setLoginError('Username atau Password Salah!');
                }
            };

            const handleViewerLogin = () => {
                setIsAuthenticated(true);
                setIsViewerMode(true);
                localStorage.setItem('silat_auth', 'viewer');
                setActiveTab('rekap');
                setTimeout(() => playWelcomeGreeting(), 100);
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setIsViewerMode(false);
                localStorage.removeItem('silat_auth');
                setUsername('');
                setPassword('');
            };

            const handleAddManual = async () => {
                if (!newStudentName.trim()) return;
                const newId = Date.now().toString();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', newId), { 
                        name: newStudentName.trim(),
                        kelas: newStudentKelas.trim() || '-'
                    });
                    setNewStudentName('');
                    setNewStudentKelas('');
                } catch(e) {
                    console.error("Error:", e);
                }
            };

            const handleSaveEdit = async (id) => {
                if (!editName.trim()) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), { 
                        name: editName.trim(),
                        kelas: editKelas.trim() || '-'
                    }, { merge: true });
                    setEditingId(null);
                } catch(e) {
                    console.error("Error:", e);
                }
            };

            const handleHapusSiswa = async (id) => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
                } catch(e) {
                    console.error("Error:", e);
                }
            };

            const handleHapusAll = async () => {
                try {
                    const batch = writeBatch(db);
                    students.forEach(student => {
                        batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'students', student.id));
                    });
                    await batch.commit();
                    setShowHapusSemuaWarning(false);
                } catch(e) {
                    console.error("Error:", e);
                }
            };

            const downloadTemplate = () => {
                const csvContent = "data:text/csv;charset=utf-8,\uFEFFNomor;Nama Siswa;Kelas\n1;Siswa Contoh A;VII-A\n2;Siswa Contoh B;VII-B\n3;Siswa Contoh C;VIII-A";
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "template_anggota.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').map(row => row.trim()).filter(row => row);
                    const startIndex = rows[0].toLowerCase().includes('nama') ? 1 : 0;
                    
                    const batch = writeBatch(db);
                    for (let i = startIndex; i < rows.length; i++) {
                        const separator = rows[i].includes(';') ? ';' : ',';
                        const columns = rows[i].split(separator);
                        
                        if (columns.length >= 2) {
                            const name = columns[1] ? columns[1].trim() : '';
                            const kelas = columns[2] ? columns[2].trim() : '-';
                            
                            if (name) {
                                const newId = Date.now().toString() + i;
                                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'students', newId), { name: name, kelas: kelas });
                            }
                        }
                    }
                    try {
                        await batch.commit();
                    } catch(error) {
                        console.error("Error:", error);
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const markAttendance = async (studentId, status) => {
                const recordId = `${studentId}_${selectedDate}`;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', recordId), { status });
                } catch(e) {
                    console.error("Error:", e);
                }
            };

            const getAttendanceStatus = (studentId, date) => {
                return attendance[`${studentId}_${date}`] || null;
            };

            const getMonthlyStats = (studentId, monthString) => {
                const stats = { Hadir: 0, Izin: 0, Sakit: 0, Alpa: 0 };
                Object.keys(attendance).forEach(key => {
                    if (key.startsWith(studentId) && key.includes(`_${monthString}`)) {
                        const status = attendance[key];
                        if (stats[status] !== undefined) stats[status]++;
                    }
                });
                return stats;
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute top-[10%] left-[10%] w-72 h-72 sm:w-[500px] sm:h-[500px] bg-white rounded-full blur-[80px] opacity-60"></div>
                        <div className="absolute bottom-[10%] right-[10%] w-72 h-72 sm:w-[400px] sm:h-[400px] bg-amber-200/40 rounded-full blur-[100px] opacity-60"></div>

                        <div className="bg-white/80 backdrop-blur-xl rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] border border-white overflow-hidden w-full max-w-md relative z-10 p-8 sm:p-12">
                            
                            <div className="flex flex-col items-center mb-10">
                                <div className="relative p-2 rounded-full bg-white shadow-[0_0_50px_rgba(245,158,11,0.4)] border-4 border-amber-50 mb-6 group cursor-default">
                                    <SmartLogo className="w-32 h-32 sm:w-40 sm:h-40 object-cover rounded-full group-hover:scale-105 transition-transform duration-500" />
                                </div>
                                <h1 className="text-3xl sm:text-4xl font-extrabold text-slate-800 tracking-tight text-center drop-shadow-sm mb-1">PENCAK SILAT</h1>
                                <h2 className="text-lg sm:text-xl font-bold text-amber-500 tracking-widest text-center uppercase mb-3">SMP Negeri 6 Manokwari</h2>
                                <div className="h-1 w-12 bg-amber-400 rounded-full mb-4"></div>
                                <p className="text-slate-500 text-center font-medium text-sm sm:text-base px-2">Sistem Absensi Digital Terpadu</p>
                            </div>

                            {loginError && (
                                <div className="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl font-semibold shadow-sm text-center animate-bounce text-sm">
                                    {loginError}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <svg className="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                        </div>
                                        <input 
                                            type="text" 
                                            value={username} 
                                            onChange={(e) => setUsername(e.target.value)} 
                                            className="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 focus:outline-none focus:ring-4 focus:ring-amber-500/20 focus:border-amber-400 focus:bg-white transition-all font-semibold text-base"
                                            placeholder="Username"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <svg className="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                        </div>
                                        <input 
                                            type="password" 
                                            value={password} 
                                            onChange={(e) => setPassword(e.target.value)} 
                                            className="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 focus:outline-none focus:ring-4 focus:ring-amber-500/20 focus:border-amber-400 focus:bg-white transition-all font-semibold text-base"
                                            placeholder="Password"
                                        />
                                    </div>
                                </div>
                                <button 
                                    type="submit" 
                                    className="w-full py-4 px-6 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-2xl shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-1 text-base tracking-wide flex justify-center items-center gap-2"
                                >
                                    MASUK SEBAGAI KETUA
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                </button>
                            </form>

                            <div className="mt-8 relative flex items-center justify-center">
                                <div className="border-t border-slate-200 w-full absolute"></div>
                                <span className="bg-white/80 px-4 text-xs font-bold text-slate-400 uppercase tracking-widest relative z-10 rounded-full">Atau</span>
                            </div>

                            <button 
                                onClick={handleViewerLogin}
                                className="mt-6 w-full py-4 px-6 bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold rounded-2xl shadow-sm hover:shadow-md border border-amber-200 transition-all text-base tracking-wide flex items-center justify-center gap-2 group"
                            >
                                <svg className="w-5 h-5 text-amber-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                LIHAT KEHADIRAN SISWA
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans print:bg-white flex flex-col">
                    <div className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 w-full print:p-0 print:max-w-none">
        
        {/* Kop Surat Cetak Resmi - Posisi Logo Bulat Sempurna di Samping Tulisan */}
        <div className="hidden print:flex flex-row items-center justify-center gap-6 border-b-[5px] border-black pb-5 mb-6 w-full">
            <div className="shrink-0 flex items-center justify-center">
                <SmartLogo className="w-28 h-28 object-cover rounded-full" />
            </div>
            <div className="text-center text-black">
                <h1 className="text-2xl sm:text-3xl font-black uppercase tracking-wide leading-tight">
                    REKAPAN ABSENSI EKSTRAKURIKULER PENCAK SILAT
                </h1>
                <h2 className="text-xl sm:text-2xl font-bold uppercase tracking-widest mt-1">
                    SMP NEGERI 6 MANOKWARI
                </h2>
            </div>
        </div>

        {/* Area Header & Dashboard Utama */}
                        <div className="bg-white p-6 sm:p-10 rounded-[2rem] shadow-[0_10px_30px_-15px_rgba(0,0,0,0.05)] print:hidden border border-slate-100 mb-6 sm:mb-8 relative">
                            
                            <div className="absolute top-6 right-6 flex gap-2 z-20 print:hidden">
                                <button 
                                    onClick={handleRefresh}
                                    className="p-2 sm:p-2.5 rounded-xl bg-slate-50 text-slate-600 hover:bg-amber-50 hover:text-amber-600 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all shadow-sm border border-slate-200"
                                    title="Segarkan Data"
                                >
                                    <svg className={`w-6 h-6 sm:w-7 sm:h-7 ${isRefreshing ? 'animate-spin text-amber-500' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                </button>
                                {!isViewerMode && (
                                    <button

                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-2 sm:gap-4 w-full sm:w-auto">
                                            <button onClick={downloadTemplate} className="w-full sm:w-auto px-4 sm:px-5 py-2.5 sm:py-3 bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 font-bold rounded-xl shadow-sm flex items-center justify-center gap-2 transition-colors text-sm sm:text-base"><svg className="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Template CSV</button>
                                            <label className="w-full sm:w-auto px-4 sm:px-5 py-2.5 sm:py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-lg shadow-green-500/30 cursor-pointer flex items-center justify-center gap-2 transition-colors text-sm sm:text-base"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> Upload CSV <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" /></label>
                                            <button onClick={() => setShowHapusSemuaWarning(true)} className="w-full sm:w-auto px-4 sm:px-5 py-2.5 sm:py-3 bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 font-bold rounded-xl shadow-sm flex items-center justify-center transition-colors text-sm sm:text-base">Hapus Semua</button>
                                        </div>
                                    </div>

                                    {/* Modal Banner Peringatan Hapus Semua */}
                                    {showHapusSemuaWarning && (
                                        <div className="mb-6 sm:mb-8 bg-red-100 border-l-4 border-red-500 p-4 sm:p-6 rounded-r-2xl flex flex-col sm:flex-row items-start sm:items-center justify-between shadow-sm animate-pulse gap-4">
                                            <div>
                                                <h4 className="text-red-800 font-bold text-base sm:text-lg mb-1">Peringatan Penghapusan Kritis!</h4>
                                                <p className="text-red-700 font-medium text-sm sm:text-base">Anda yakin ingin menghapus seluruh data siswa di server awan permanen?</p>
                                            </div>
                                            <div className="flex gap-2 sm:gap-3 w-full sm:w-auto">
                                                <button onClick={() => setShowHapusSemuaWarning(false)} className="flex-1 sm:flex-none px-4 sm:px-5 py-2 sm:py-2.5 bg-white text-slate-700 font-bold rounded-xl shadow-sm border border-slate-200 text-sm sm:text-base">Batal</button>
                                                <button onClick={handleHapusAll} className="flex-1 sm:flex-none px-4 sm:px-5 py-2 sm:py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-md text-sm sm:text-base">Ya, Hapus Semua</button>
                                            </div>
                                        </div>
                                    )}

                                    {/* Form Tambah Manual */}
                                    <div className="bg-slate-50/80 p-4 sm:p-8 rounded-2xl sm:rounded-[2rem] border border-slate-100 mb-6 sm:mb-8 shadow-inner">
                                        <h4 className="font-extrabold text-slate-500 mb-3 sm:mb-4 uppercase tracking-widest text-xs sm:text-sm">Tambah Anggota Manual</h4>
                                        <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                                            <input type="text" placeholder="Nama Lengkap Siswa Baru..." value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} className="w-full sm:flex-[2] px-4 sm:px-6 py-3 sm:py-4 bg-white border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-4 focus:ring-amber-500/20 focus:border-amber-400 transition-all font-semibold text-base sm:text-lg" />
                                            <input type="text" placeholder="Kelas (cth: VII-A)" value={newStudentKelas} onChange={(e) => setNewStudentKelas(e.target.value)} className="w-full sm:flex-1 px-4 sm:px-6 py-3 sm:py-4 bg-white border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-4 focus:ring-amber-500/20 focus:border-amber-400 transition-all font-semibold text-base sm:text-lg" />
                                            <button onClick={handleAddManual} className="w-full sm:w-auto px-6 sm:px-10 py-3 sm:py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 text-base sm:text-lg">Tambahkan</button>
                                        </div>
                                    </div>

                                    {/* Tabel Daftar Siswa */}
                                    <div className="overflow-x-auto -mx-4 sm:mx-0 sm:rounded-2xl border-y sm:border border-slate-100 shadow-sm">
                                        <table className="w-full text-left border-collapse min-w-[500px]">
                                            <thead>
                                                <tr className="bg-slate-50 text-slate-500 uppercase text-xs font-bold tracking-widest">
                                                    <th className="p-3 sm:p-5 border-b border-slate-100 w-12 sm:w-20 text-center">No</th>
                                                    <th className="p-3 sm:p-5 border-b border-slate-100">Nama Lengkap</th>
                                                    <th className="p-3 sm:p-5 border-b border-slate-100 w-20 sm:w-32 text-center">Kelas</th>
                                                    <th className="p-3 sm:p-5 border-b border-slate-100 w-28 sm:w-40 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {students.length === 0 ? (
                                                    <tr><td colSpan="4" className="p-8 sm:p-10 text-center text-slate-400 italic font-medium text-sm sm:text-base">Belum ada data anggota.</td></tr>
                                                ) : (
                                                    students.map((student, index) => (
                                                        <tr key={student.id} className="border-b border-slate-50 hover:bg-slate-50/80 transition-colors">
                                                            <td className="p-3 sm:p-5 text-center text-slate-500 font-bold text-sm sm:text-lg">{index + 1}</td>
                                                            <td className="p-3 sm:p-5">
                                                                {editingId === student.id ? (
                                                                    <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="w-full px-2 py-1.5 sm:px-3 sm:py-2 border-2 border-amber-400 rounded-lg sm:rounded-xl focus:outline-none focus:ring-4 focus:ring-amber-500/20 bg-white text-slate-800 font-bold shadow-sm text-sm sm:text-base" />
                                                                ) : (
                                                                    <span className="font-bold text-slate-800 text-sm sm:text-lg whitespace-nowrap">{student.name}</span>
                                                                )}
                                                            </td>
                                                            <td className="p-3 sm:p-5 text-center">
                                                                {editingId === student.id ? (
                                                                    <input type="text" value={editKelas} onChange={(e) => setEditKelas(e.target.value)} className="w-full px-1 py-1.5 sm:px-2 sm:py-2 border-2 border-amber-400 rounded-lg sm:rounded-xl focus:outline-none focus:ring-4 focus:ring-amber-500/20 bg-white text-slate-800 font-bold shadow-sm text-center text-sm sm:text-base" />
                                                                ) : (
                                                                    <span className="font-semibold text-slate-600 bg-slate-100 px-2 py-1 sm:px-4 sm:py-1.5 rounded-md sm:rounded-lg text-xs sm:text-base">{student.kelas}</span>
                                                                )}
                                                            </td>
                                                            <td className="p-3 sm:p-5 text-center">
                                                                <div className="flex justify-center gap-1.5 sm:gap-3">
                                                                    {editingId === student.id ? (
                                                                        <button onClick={() => handleSaveEdit(student.id)} className="p-1.5 sm:p-3 bg-green-100 text-green-700 hover:bg-green-200 hover:scale-110 transition-transform rounded-lg sm:rounded-xl shadow-sm" title="Simpan"><svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg></button>
                                                                    ) : (
                                                                        <button onClick={() => { setEditingId(student.id); setEditName(student.name); setEditKelas(student.kelas || ''); }} className="p-1.5 sm:p-3 bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-100 hover:scale-110 transition-transform rounded-lg sm:rounded-xl shadow-sm" title="Edit Data"><svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                                                                    )}
                                                                    <button onClick={() => handleHapusSiswa(student.id)} className="p-1.5 sm:p-3 bg-red-50 text-red-600 border border-red-100 hover:bg-red-100 hover:scale-110 transition-transform rounded-lg sm:rounded-xl shadow-sm" title="Hapus Siswa"><svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                    
                    {/* Area Kaki Aplikasi (Footer) Mewah Sesuai Desain Alfian - Sembunyi Saat Print */}
                    <footer className="mt-auto py-6 text-center print:hidden bg-slate-900 border-t border-amber-500/30 w-full mt-12 rounded-t-[2rem] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                        <p className="text-xs sm:text-sm font-semibold text-amber-400 tracking-widest font-mono uppercase px-4">
                            Aplikasi Absensi Digital di Kembangkan dan di Desain oleh <span className="font-black text-yellow-300 underline decoration-amber-500 underline-offset-4">ALFIAN</span> - Guru Bimbingan Konseling
                        </p>
                    </footer>

                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
