<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Aplikasi Absensi Premium - Pencak Silat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel untuk JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map untuk ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
        }
    }
    </script>
    
    <style>
        @media print {
            @page { 
                size: landscape; 
                margin: 1cm; 
            }
            body { 
                background-color: white !important; 
                color: black !important;
            }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:flex { display: flex !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:bg-transparent { background-color: transparent !important; }
            .print\:rounded-none { border-radius: 0 !important; }
            .print\:overflow-visible { overflow: visible !important; }
            
            table {
                width: 100% !important;
                border-collapse: collapse !important;
            }
            th, td {
                border: 1px solid black !important;
                color: black !important;
                padding: 6px !important;
                font-size: 12px !important;
            }
            th {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
        
        /* Mencegah scrollbar horizontal yang mengganggu pada tampilan seluler */
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">
    
    <!-- Wadah Aplikasi React -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Printer, UserPlus, Trash2, Edit2, CheckCircle, XCircle, 
            AlertCircle, Calendar, Users, FileText, Download, Upload,
            Save, X, LogOut, Menu, Loader2
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, writeBatch, deleteDoc } from 'firebase/firestore';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCOyxeKmdRHfLYtSKdWvS7mxkkeZaUvW4k",
            authDomain: "pencaksilat2026.firebaseapp.com",
            projectId: "pencaksilat2026",
            storageBucket: "pencaksilat2026.firebasestorage.app",
            messagingSenderId: "114867206597",
            appId: "1:114867206597:web:75332626ce01c26a15b3ac",
            measurementId: "G-W6JZPS393P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pencaksilat2026';

        function SmartLogo({ className }) {
            const primarySrc = "https://i.ibb.co.com/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png";
            const alternateSrc = "https://i.ibb.co.com/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png";
            
            const [src, setSrc] = useState(primarySrc);
            const [loading, setLoading] = useState(true);
            const [retryCount, setRetryCount] = useState(0);

            const handleImageError = () => {
                const nextSrc = src.includes(".co.com") ? alternateSrc : primarySrc;
                if (retryCount < 10) {
                    setTimeout(() => {
                        setSrc(nextSrc + "?retry=" + retryCount);
                        setRetryCount(prev => prev + 1);
                    }, 1500);
                } else {
                    setSrc(alternateSrc);
                    setLoading(false);
                }
            };

            return (
                <div className={`relative inline-block overflow-hidden rounded-full bg-amber-50/30 ${className}`}>
                    {loading && (
                        <div className="absolute inset-0 flex items-center justify-center">
                            <Loader2 className="w-5 h-5 text-amber-500 animate-spin" />
                        </div>
                    )}
                    <img 
                        src={src} 
                        alt="Logo Pencak Silat" 
                        className={`w-full h-full ${loading ? 'opacity-0 scale-95' : 'opacity-100 scale-100'} transition-all duration-300 object-cover`}
                        onLoad={() => setLoading(false)}
                        onError={handleImageError}
                    />
                </div>
            );
        }

        const getLocalDate = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };
        const getLocalMonth = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(() => localStorage.getItem('silat_auth') !== null);
            const [isViewerMode, setIsViewerMode] = useState(() => localStorage.getItem('silat_auth') === 'viewer');
            
            // Autentikasi
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // Navigasi & UI
            const [activeTab, setActiveTab] = useState('entri');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [isAppInstalled, setIsAppInstalled] = useState(false);
            
            // Sistem Notifikasi (Toast) & Konfirmasi
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [confirmDialog, setConfirmDialog] = useState({ show: false, message: '', onConfirm: null });
            
            // Data Aplikasi
            const [students, setStudents] = useState([]);
            const [attendance, setAttendance] = useState({});

            // Kontrol Input Harian & Rekap
            const [selectedDate, setSelectedDate] = useState(getLocalDate());
            const [selectedMonth, setSelectedMonth] = useState(getLocalMonth());

            // Kontrol Data Cetak Laporan
            const [coachName, setCoachName] = useState(() => localStorage.getItem('silat_coach') || 'ALFIAN, S.Pd.');
            const [coachNip, setCoachNip] = useState(() => localStorage.getItem('silat_nip') || '');
            const [establishedIn, setEstablishedIn] = useState(() => localStorage.getItem('silat_established') || 'Manokwari');

            // Kontrol Manajemen Anggota
            const [newStudentName, setNewStudentName] = useState('');
            const [newStudentKelas, setNewStudentKelas] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editName, setEditName] = useState('');
            const [editKelas, setEditKelas] = useState('');
            const [showHapusSemuaWarning, setShowHapusSemuaWarning] = useState(false);

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            const requestConfirm = (message, onConfirmCallback) => {
                setConfirmDialog({ show: true, message, onConfirm: onConfirmCallback });
            };

            // Membunyikan sapaan selamat datang hanya sekali di awal buka aplikasi (sessionStorage)
            const playWelcomeGreeting = () => {
                if (sessionStorage.getItem('silat_welcomed') === 'true') {
                    return;
                }

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance("Selamat datang di aplikasi absensi Pencak Silat.");
                    utterance.lang = "id-ID";
                    utterance.volume = 1.0;
                    utterance.rate = 0.95;
                    utterance.pitch = 1.0;

                    const voices = window.speechSynthesis.getVoices();
                    const idVoice = voices.find(v => v.lang.startsWith('id') || v.lang.startsWith('ID'));
                    if (idVoice) utterance.voice = idVoice;

                    window.speechSynthesis.speak(utterance);
                    sessionStorage.setItem('silat_welcomed', 'true');
                }
            };

            useEffect(() => {
                if (isAuthenticated) {
                    const handleFirstInteraction = () => {
                        playWelcomeGreeting();
                        document.removeEventListener('click', handleFirstInteraction);
                    };
                    document.addEventListener('click', handleFirstInteraction);
                    return () => document.removeEventListener('click', handleFirstInteraction);
                }
            }, [isAuthenticated]);

            // Deteksi Status Instalasi Aplikasi PWA dan Membangun installer terpadu
            useEffect(() => {
                // 1. Cek apakah berjalan dalam mode standalone (sudah terinstal)
                if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                    setIsAppInstalled(true);
                }

                const manifest = {
                    name: "Absensi Pencak Silat",
                    short_name: "Silat App",
                    start_url: window.location.href,
                    display: "standalone",
                    background_color: "#ffffff",
                    theme_color: "#f59e0b",
                    icons: [{
                        src: "https://i.ibb.co/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png",
                        sizes: "192x192",
                        type: "image/png"
                    }, {
                        src: "https://i.ibb.co/Vc9jB0vP/Simple-Modern-Minimalist-Circle-Design-Studio-Logo.png",
                        sizes: "512x512",
                        type: "image/png"
                    }]
                };
                const stringManifest = JSON.stringify(manifest);
                const blob = new Blob([stringManifest], {type: 'application/json'});
                const manifestURL = URL.createObjectURL(blob);
                
                let link = document.querySelector('link[rel="manifest"]');
                if (!link) {
                    link = document.createElement('link');
                    link.rel = 'manifest';
                    document.head.appendChild(link);
                }
                link.href = manifestURL;

                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };

                const handleAppInstalled = () => {
                    setIsAppInstalled(true);
                    setDeferredPrompt(null);
                    showToast('Aplikasi Pencak Silat berhasil diinstal!');
                };

                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                window.addEventListener('appinstalled', handleAppInstalled);

                return () => {
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                    window.removeEventListener('appinstalled', handleAppInstalled);
                };
            }, []);

            useEffect(() => {
                localStorage.setItem('silat_coach', coachName);
                localStorage.setItem('silat_nip', coachNip);
                localStorage.setItem('silat_established', establishedIn);
            }, [coachName, coachNip, establishedIn]);

            // Menghubungkan listeners database real-time Firebase
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (err) {
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Firebase Auth Error:", error);
                    }
                };
                initAuth();
                
                const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const unsubStudents = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), (snapshot) => {
                            const studentData = [];
                            snapshot.forEach(doc => studentData.push({ 
                                id: doc.id, 
                                name: doc.data().name,
                                kelas: doc.data().kelas || '-'
                            }));
                            studentData.sort((a, b) => a.name.localeCompare(b.name));
                            setStudents(studentData);
                            setIsLoadingData(false);
                        }, (err) => {
                            console.error(err);
                            setIsLoadingData(false);
                        });

                        const unsubAttendance = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snapshot) => {
                            const attendanceData = {};
                            snapshot.forEach(doc => {
                                attendanceData[doc.id] = doc.data().status;
                            });
                            setAttendance(attendanceData);
                        }, (err) => console.error(err));

                        return () => {
                            unsubStudents();
                            unsubAttendance();
                        };
                    } else {
                        setIsLoadingData(false);
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            const formattedCurrentDate = new Date().toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            // --- LOGIC AUTHENTICATION ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (username.trim().toLowerCase() === 'siswa' && password === 'silat2026') {
                    setIsAuthenticated(true);
                    setIsViewerMode(false);
                    localStorage.setItem('silat_auth', 'admin');
                    setLoginError('');
                    setActiveTab('entri');
                } else {
                    setLoginError('Username atau Password Salah!');
                }
            };

            const handleViewerLogin = () => {
                setIsAuthenticated(true);
                setIsViewerMode(true);
                localStorage.setItem('silat_auth', 'viewer');
                setActiveTab('rekap');
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setIsViewerMode(false);
                localStorage.removeItem('silat_auth');
                setUsername('');
                setPassword('');
            };

            const markAttendance = async (studentId, status) => {
                if (isViewerMode) return;
                const recordId = `${studentId}_${selectedDate}`;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', recordId), { status });
                } catch(e) {
                    showToast('Gagal menyimpan absensi', 'error');
                    console.error("Error:", e);
                }
            };

            const getAttendanceStatus = (studentId, date) => {
                return attendance[`${studentId}_${date}`] || null;
            };

            const getMonthlyStats = (studentId, monthString) => {
                const stats = { Hadir: 0, Izin: 0, Sakit: 0, Alpa: 0 };
                Object.keys(attendance).forEach(key => {
                    if (key.startsWith(studentId) && key.includes(`_${monthString}`)) {
                        const status = attendance[key];
                        if (stats[status] !== undefined) stats[status]++;
                    }
                });
                return stats;
            };

            // --- LOGIC MANAJEMEN ANGGOTA & CSV ---
            const handleAddManual = async () => {
                if (!newStudentName.trim()) {
                    showToast('Nama siswa tidak boleh kosong!', 'error');
                    return;
                }
                const newId = Date.now().toString();
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', newId), { 
                        name: newStudentName.trim(),
                        kelas: newStudentKelas.trim() || '-'
                    });
                    setNewStudentName('');
                    setNewStudentKelas('');
                    showToast('Anggota berhasil ditambahkan!');
                } catch(e) {
                    showToast('Gagal menambah anggota', 'error');
                    console.error("Error:", e);
                }
            };

            const handleSaveEdit = async (id) => {
                if (!editName.trim()) {
                    showToast('Nama siswa tidak boleh kosong!', 'error');
                    return;
                }
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), { 
                        name: editName.trim(),
                        kelas: editKelas.trim() || '-'
                    }, { merge: true });
                    setEditingId(null);
                    showToast('Perubahan berhasil disimpan!');
                } catch(e) {
                    showToast('Gagal menyimpan perubahan', 'error');
                    console.error("Error:", e);
                }
            };

            const handleHapusSiswa = (id) => {
                requestConfirm('Apakah Anda yakin ingin menghapus data anggota ini?', async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
                        showToast('Data anggota berhasil dihapus!');
                    } catch(e) {
                        showToast('Gagal menghapus data', 'error');
                        console.error("Error:", e);
                    }
                });
            };

            const handleHapusAll = async () => {
                try {
                    const batch = writeBatch(db);
                    students.forEach(student => {
                        batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'students', student.id));
                    });
                    await batch.commit();
                    setShowHapusSemuaWarning(false);
                    showToast('Seluruh data anggota telah dibersihkan!');
                } catch(e) {
                    showToast('Gagal membersihkan data', 'error');
                    console.error("Error:", e);
                }
            };

            const downloadTemplate = () => {
                const csvContent = "data:text/csv;charset=utf-8,\uFEFFNomor;Nama Siswa;Kelas\n1;Siswa Contoh A;VII-A\n2;Siswa Contoh B;VII-B\n3;Siswa Contoh C;VIII-A";
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "template_anggota.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('Template CSV berhasil diunduh!');
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').map(row => row.trim()).filter(row => row);
                    const startIndex = rows[0].toLowerCase().includes('nama') ? 1 : 0;
                    
                    const batch = writeBatch(db);
                    let importedCount = 0;
                    
                    for (let i = startIndex; i < rows.length; i++) {
                        const separator = rows[i].includes(';') ? ';' : ',';
                        const columns = rows[i].split(separator);
                        
                        if (columns.length >= 2) {
                            const name = columns[1] ? columns[1].trim() : '';
                            const kelas = columns[2] ? columns[2].trim() : '-';
                            
                            if (name) {
                                const newId = Date.now().toString() + i;
                                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'students', newId), { name: name, kelas: kelas });
                                importedCount++;
                            }
                        }
                    }
                    try {
                        if (importedCount > 0) {
                            await batch.commit();
                            showToast(`${importedCount} data berhasil diimpor!`);
                        } else {
                            showToast('Tidak ada data yang valid ditemukan.', 'error');
                        }
                    } catch(error) {
                        showToast('Gagal mengimpor data', 'error');
                        console.error("Error:", error);
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const handleRefresh = () => {
                setIsRefreshing(true);
                setTimeout(() => {
                    setIsRefreshing(false);
                    showToast('Koneksi aman. Data diperbarui waktu-nyata!');
                }, 750);
            };

            // Menangani trigger instalasi aplikasi PWA
            const handleInstallApp = async () => {
                if (isAppInstalled) {
                    showToast('Aplikasi sudah terinstal di perangkat Anda!');
                    return;
                }
                
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        setIsAppInstalled(true);
                        setDeferredPrompt(null);
                    }
                } else {
                    // Panduan instalasi manual sebagai fallback jika API tidak aktif
                    showToast('Buka menu browser Anda (titik tiga) lalu klik "Tambahkan ke Layar Utama" / "Instal Aplikasi".');
                }
            };

            // ==========================================
            // KOMPONEN NOTIFIKASI TOAST & CONFIRM DIALOG
            // ==========================================
            const ToastNotification = () => {
                if (!toast.show) return null;
                const isError = toast.type === 'error';
                return (
                    <div className={`fixed top-4 right-4 z-50 px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-2 transform transition-all animate-bounce ${isError ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`}>
                        {isError ? <AlertCircle className="w-4 h-4" /> : <CheckCircle className="w-4 h-4" />}
                        <span className="font-bold text-xs sm:text-sm">{toast.message}</span>
                    </div>
                );
            };

            const ConfirmModal = () => {
                if (!confirmDialog.show) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 print:hidden">
                        <div className="bg-white rounded-2xl p-5 max-w-xs w-full shadow-xl animate-in zoom-in-95 duration-150">
                            <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-3 mx-auto">
                                <AlertCircle className="w-6 h-6 text-red-500" />
                            </div>
                            <h3 className="text-lg font-extrabold text-slate-800 mb-1 text-center">Konfirmasi</h3>
                            <p className="text-slate-600 mb-5 text-center font-medium text-xs sm:text-sm">{confirmDialog.message}</p>
                            <div className="flex justify-center gap-2">
                                <button onClick={() => setConfirmDialog({show:false})} className="px-4 py-2 bg-slate-100 text-slate-700 font-bold text-xs sm:text-sm rounded-lg hover:bg-slate-200 transition-colors">Batal</button>
                                <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({show:false}); }} className="px-4 py-2 bg-amber-500 text-white font-bold text-xs sm:text-sm rounded-lg hover:bg-amber-600 shadow-sm transition-colors">Ya</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // ==========================================
            // RENDER LAYAR LOGIN (DIOPTIMALKAN UNTUK HP)
            // ==========================================
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 flex items-center justify-center p-4 relative overflow-hidden font-sans">
                        <div className="absolute top-[5%] left-[5%] w-48 h-48 sm:w-[400px] sm:h-[400px] bg-white rounded-full blur-[60px] opacity-60 pointer-events-none"></div>
                        <div className="absolute bottom-[5%] right-[5%] w-48 h-48 sm:w-[350px] sm:h-[350px] bg-amber-200/30 rounded-full blur-[80px] opacity-60 pointer-events-none"></div>

                        <div className="bg-white/90 backdrop-blur-md rounded-3xl shadow-[0_15px_40px_-15px_rgba(0,0,0,0.08)] border border-white overflow-hidden w-full max-w-sm relative z-10 p-5 sm:p-10">
                            
                            <div className="flex flex-col items-center mb-6">
                                <div className="relative p-1.5 rounded-full bg-white shadow-[0_0_30px_rgba(245,158,11,0.3)] border-2 border-amber-50 mb-4 group cursor-default">
                                    <SmartLogo className="w-20 h-20 sm:w-28 sm:h-28 object-cover rounded-full group-hover:scale-105 transition-transform duration-300" />
                                </div>
                                <h1 className="text-xl sm:text-2xl font-black text-slate-800 tracking-tight text-center mb-0.5">PENCAK SILAT</h1>
                                <h2 className="text-xs sm:text-sm font-bold text-amber-500 tracking-widest text-center uppercase mb-2">SMP Negeri 6 Manokwari</h2>
                                <div className="h-0.5 w-8 bg-amber-400 rounded-full mb-2"></div>
                                <p className="text-slate-400 text-center font-medium text-xs">Sistem Absensi Digital Terpadu</p>
                            </div>

                            {loginError && (
                                <div className="mb-4 p-2.5 bg-red-50 border border-red-100 text-red-600 rounded-lg font-semibold text-center text-xs w-full animate-pulse">
                                    {loginError}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-3.5 w-full">
                                <div>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <Users className="h-4 w-4 text-slate-400" />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={username} 
                                            onChange={(e) => setUsername(e.target.value)} 
                                            className="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 focus:bg-white transition-all font-semibold text-sm"
                                            placeholder="Username (siswa)"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <svg className="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                        </div>
                                        <input 
                                            type="password" 
                                            value={password} 
                                            onChange={(e) => setPassword(e.target.value)} 
                                            className="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-400 focus:bg-white transition-all font-semibold text-sm"
                                            placeholder="Password"
                                        />
                                    </div>
                                </div>
                                <button 
                                    type="submit" 
                                    className="w-full py-2.5 px-4 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 text-sm tracking-wide flex justify-center items-center gap-1.5"
                                >
                                    MASUK SEBAGAI KETUA
                                </button>
                            </form>

                            <div className="mt-5 relative flex items-center justify-center w-full">
                                <div className="border-t border-slate-200 w-full absolute"></div>
                                <span className="bg-white/90 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest relative z-10 rounded-full">Atau</span>
                            </div>

                            <button 
                                onClick={handleViewerLogin}
                                className="mt-4 w-full py-2.5 px-4 bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold rounded-xl shadow-xs border border-amber-200 transition-all text-xs tracking-wide flex items-center justify-center gap-1.5 group"
                            >
                                <svg className="w-4 h-4 text-amber-500 group-hover:scale-105 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                LIHAT KEHADIRAN SISWA
                            </button>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // RENDER APLIKASI UTAMA (DESAIN HP PREMIUM)
            // ==========================================
            return (
                <div className="min-h-screen bg-slate-50 font-sans print:bg-white flex flex-col">
                    <ToastNotification />
                    <ConfirmModal />
                    
                    <div className="max-w-7xl mx-auto p-2 sm:p-6 lg:p-8 w-full print:p-0 print:max-w-none flex-grow">
                        
                        {/* Kop Surat Cetak Resmi */}
                        <div className="hidden print:flex flex-row items-center justify-center gap-6 border-b-[5px] border-black pb-5 mb-6 w-full">
                            <div className="shrink-0 flex items-center justify-center">
                                <SmartLogo className="w-28 h-28 object-cover rounded-full" />
                            </div>
                            <div className="text-center text-black">
                                <h1 className="text-2xl sm:text-3xl font-black uppercase tracking-wide leading-tight">
                                    REKAPAN ABSENSI EKSTRAKURIKULER PENCAK SILAT
                                </h1>
                                <h2 className="text-xl sm:text-2xl font-bold uppercase tracking-widest mt-1">
                                    SMP NEGERI 6 MANOKWARI
                                </h2>
                            </div>
                        </div>

                        <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-xs print:hidden border border-slate-100 mb-3 sm:mb-6 flex flex-col gap-4">
                            
                            {/* Baris 1: Brand/Logo & Aksi Sejajar */}
                            <div className="flex flex-row justify-between items-center w-full gap-2">
                                <div className="flex items-center gap-2.5">
                                    <div className="bg-amber-500 p-2 rounded-xl shadow-inner hidden sm:block">
                                        <Users className="w-6 h-6 text-white" />
                                    </div>
                                    <div>
                                        <h1 className="text-lg sm:text-2xl font-black text-slate-800 tracking-tight">
                                            Absensi <span className="text-amber-500">Terpadu</span>
                                        </h1>
                                        <p className="text-slate-400 text-[10px] sm:text-xs font-medium">Sistem Manajemen Ekstrakurikuler V2</p>
                                    </div>
                                </div>

                                {/* Tombol Refresh, Instalasi PWA, dan Logout yang Presisi */}
                                <div className="flex items-center gap-1.5 shrink-0">
                                    {/* Tombol Instal Aplikasi (PWA) Hanya Muncul jika belum terinstal */}
                                    {!isAppInstalled && (
                                        <button 
                                            onClick={handleInstallApp}
                                            className="p-1.5 sm:p-2 rounded-lg bg-amber-500 hover:bg-amber-600 text-white font-bold text-xs flex items-center gap-1 shadow-sm transition-all focus:outline-none focus:ring-1 focus:ring-amber-400"
                                            title="Instal Aplikasi ke HP"
                                        >
                                            <Download className="w-4 h-4" />
                                            <span className="hidden md:inline">Instal Aplikasi</span>
                                        </button>
                                    )}
                                    <button 
                                        onClick={handleRefresh}
                                        className="p-1.5 sm:p-2 rounded-lg bg-slate-50 text-slate-600 hover:bg-amber-50 hover:text-amber-600 focus:outline-none focus:ring-1 focus:ring-amber-400 transition-all border border-slate-200"
                                        title="Segarkan Data"
                                    >
                                        <svg className={`w-4 h-4 sm:w-5 sm:h-5 ${isRefreshing ? 'animate-spin text-amber-500' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                        </svg>
                                    </button>
                                    <button 
                                        onClick={handleLogout}
                                        className="p-1.5 sm:p-2 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 focus:outline-none focus:ring-1 focus:ring-red-400 transition-all border border-red-150 flex items-center gap-1"
                                        title="Keluar"
                                    >
                                        <LogOut className="w-4 h-4 sm:w-5 sm:h-5" />
                                        <span className="font-bold text-xs hidden sm:inline">Keluar</span>
                                    </button>
                                    <button 
                                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                                        className="sm:hidden p-1.5 rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200"
                                    >
                                        <Menu className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>

                            <div className="w-full flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-2 border-t border-slate-100 pt-3">
                                {/* Tab Navigasi Menu */}
                                <div className={`${isMobileMenuOpen ? 'flex' : 'hidden'} sm:flex flex-col sm:flex-row bg-slate-100 p-1 rounded-xl w-full sm:w-auto gap-0.5`}>
                                    <button 
                                        onClick={() => {setActiveTab('entri'); setIsMobileMenuOpen(false);}} 
                                        className={`px-3 py-1.5 sm:py-2 rounded-lg text-xs font-bold whitespace-nowrap transition-all text-center ${activeTab === 'entri' ? 'bg-white text-amber-600 shadow-xs' : 'text-slate-500 hover:text-slate-800'}`}
                                    >
                                        Absensi Harian
                                    </button>
                                    <button 
                                        onClick={() => {setActiveTab('rekap'); setIsMobileMenuOpen(false);}} 
                                        className={`px-3 py-1.5 sm:py-2 rounded-lg text-xs font-bold whitespace-nowrap transition-all text-center ${activeTab === 'rekap' ? 'bg-white text-amber-600 shadow-xs' : 'text-slate-500 hover:text-slate-800'}`}
                                    >
                                        Rekap Bulanan
                                    </button>
                                    {!isViewerMode && (
                                        <button 
                                            onClick={() => {setActiveTab('anggota'); setIsMobileMenuOpen(false);}} 
                                            className={`px-3 py-1.5 sm:py-2 rounded-lg text-xs font-bold whitespace-nowrap transition-all text-center ${activeTab === 'anggota' ? 'bg-white text-amber-600 shadow-xs' : 'text-slate-500 hover:text-slate-800'}`}
                                        >
                                            Data Anggota
                                        </button>
                                    )}
                                </div>

                                {/* Status Sesi Waktu */}
                                <div className="flex items-center justify-end gap-1 text-slate-400 text-[10px] sm:text-xs font-semibold pt-1 sm:pt-0">
                                    <Calendar className="w-3.5 h-3.5 text-slate-400" />
                                    <span>Sesi: {formattedCurrentDate}</span>
                                </div>
                            </div>
                        </div>

                        <main className="w-full">
                            <div className="bg-white rounded-2xl shadow-xs border border-slate-150 overflow-hidden print:border-none print:shadow-none print:bg-transparent print:rounded-none">
                                
                                {/* TAB 1: ABSENSI HARIAN (SANGAT COMPACT DI HP) */}
                                {activeTab === 'entri' && (
                                    <div className="p-3 sm:p-8 print:hidden">
                                        <div className="flex flex-row justify-between items-center mb-4 pb-3 border-b border-slate-100 gap-2">
                                            <div>
                                                <h3 className="text-sm sm:text-lg font-black text-slate-800 mb-1">Absensi Harian</h3>
                                                <input 
                                                    type="date" 
                                                    value={selectedDate} 
                                                    onChange={(e) => setSelectedDate(e.target.value)}
                                                    className="px-2.5 py-1 text-xs bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-1 focus:ring-amber-500 font-bold outline-none"
                                                />
                                            </div>
                                            
                                            {!isViewerMode && (
                                                <div className="flex items-center gap-1 bg-slate-100 p-1 rounded-lg shrink-0">
                                                    <button 
                                                        onClick={() => setIsViewerMode(false)}
                                                        className={`px-2 py-1 rounded-md text-[10px] sm:text-xs font-bold transition-all ${!isViewerMode ? 'bg-white text-slate-800 shadow-xs' : 'text-slate-400'}`}
                                                    >Edit</button>
                                                    <button 
                                                        onClick={() => setIsViewerMode(true)}
                                                        className={`px-2 py-1 rounded-md text-[10px] sm:text-xs font-bold transition-all ${isViewerMode ? 'bg-blue-500 text-white shadow-xs' : 'text-slate-400'}`}
                                                    >Viewer</button>
                                                </div>
                                            )}
                                        </div>

                                        {/* Tabel Absensi Harian Kompresi Tinggi */}
                                        <div className="overflow-x-auto border border-slate-100 rounded-xl relative min-h-[150px]">
                                            {isLoadingData && (
                                                <div className="absolute inset-0 z-10 bg-white/70 backdrop-blur-xs flex items-center justify-center rounded-xl">
                                                    <Loader2 className="w-8 h-8 text-amber-500 animate-spin" />
                                                </div>
                                            )}
                                            <table className="w-full text-left border-collapse min-w-[500px]">
                                                <thead>
                                                    <tr className="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold tracking-wider">
                                                        <th className="p-2 sm:p-3 border-b border-slate-100 w-10 text-center">No</th>
                                                        <th className="p-2 sm:p-3 border-b border-slate-100">Nama Siswa</th>
                                                        <th className="p-2 sm:p-3 border-b border-slate-100 w-20 text-center">Kelas</th>
                                                        <th className="p-2 sm:p-3 border-b border-slate-100 text-center w-60">Status Kehadiran</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {!isLoadingData && students.length === 0 ? (
                                                        <tr><td colSpan="4" className="p-6 text-center text-slate-400 text-xs font-medium">Belum ada data anggota. Buka tab "Data Anggota" untuk menambahkan siswa.</td></tr>
                                                    ) : (
                                                        students.map((student, index) => {
                                                            const status = getAttendanceStatus(student.id, selectedDate);
                                                            return (
                                                                <tr key={student.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                                    <td className="p-2 sm:p-3 text-center text-slate-400 font-bold text-xs">{index + 1}</td>
                                                                    <td className="p-2 sm:p-3 text-slate-700 font-bold text-xs sm:text-sm">{student.name}</td>
                                                                    <td className="p-2 sm:p-3 text-center text-slate-500 bg-slate-50/30 font-bold text-xs">{student.kelas}</td>
                                                                    <td className="p-2 sm:p-3">
                                                                        <div className="flex justify-center gap-1">
                                                                            <button 
                                                                                onClick={() => markAttendance(student.id, 'Hadir')} 
                                                                                disabled={isViewerMode}
                                                                                className={`px-2 py-1 rounded-md font-bold text-[10px] sm:text-xs transition-all ${status === 'Hadir' ? 'bg-green-500 text-white shadow-xs' : 'bg-green-50 text-green-700 hover:bg-green-100'} ${isViewerMode ? 'opacity-40 cursor-not-allowed' : ''}`}
                                                                            >Hadir</button>
                                                                            <button 
                                                                                onClick={() => markAttendance(student.id, 'Izin')} 
                                                                                disabled={isViewerMode}
                                                                                className={`px-2 py-1 rounded-md font-bold text-[10px] sm:text-xs transition-all ${status === 'Izin' ? 'bg-blue-500 text-white shadow-xs' : 'bg-blue-50 text-blue-700 hover:bg-blue-100'} ${isViewerMode ? 'opacity-40 cursor-not-allowed' : ''}`}
                                                                            >Izin</button>
                                                                            <button 
                                                                                onClick={() => markAttendance(student.id, 'Sakit')} 
                                                                                disabled={isViewerMode}
                                                                                className={`px-2 py-1 rounded-md font-bold text-[10px] sm:text-xs transition-all ${status === 'Sakit' ? 'bg-amber-500 text-white shadow-xs' : 'bg-amber-50 text-amber-700 hover:bg-amber-100'} ${isViewerMode ? 'opacity-40 cursor-not-allowed' : ''}`}
                                                                            >Sakit</button>
                                                                            <button 
                                                                                onClick={() => markAttendance(student.id, 'Alpa')} 
                                                                                disabled={isViewerMode}
                                                                                className={`px-2 py-1 rounded-md font-bold text-[10px] sm:text-xs transition-all ${status === 'Alpa' ? 'bg-red-500 text-white shadow-xs' : 'bg-red-50 text-red-700 hover:bg-red-100'} ${isViewerMode ? 'opacity-40 cursor-not-allowed' : ''}`}
                                                                            >Alpa</button>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )
                                                        })
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'rekap' && (
                                    <div className="p-3 sm:p-8 print:p-0">
                                        <div className="flex flex-row justify-between items-center mb-4 pb-3 border-b border-slate-100 gap-2 print:hidden">
                                            <div>
                                                <h3 className="text-xs sm:text-lg font-black text-slate-800 mb-1">Rekap Bulanan</h3>
                                                <input 
                                                    type="month" 
                                                    value={selectedMonth} 
                                                    onChange={(e) => setSelectedMonth(e.target.value)}
                                                    className="px-2 py-1 text-xs bg-blue-50 border border-blue-200 text-blue-800 rounded-lg focus:ring-1 focus:ring-blue-500 font-bold outline-none"
                                                />
                                            </div>
                                            {!isViewerMode && (
                                                <button onClick={() => window.print()} className="px-3 py-1.5 bg-slate-800 hover:bg-slate-900 text-white font-bold text-xs rounded-xl flex items-center gap-1.5 shadow-sm transition-all">
                                                    <Printer className="w-3.5 h-3.5" /> Cetak
                                                </button>
                                            )}
                                        </div>

                                        <div className="hidden print:block text-center mb-6">
                                            <h3 className="text-lg font-bold underline uppercase tracking-widest">LAPORAN REKAPITULASI KEHADIRAN BULANAN</h3>
                                            <p className="text-sm font-semibold mt-1">Bulan: {new Date(selectedMonth + '-01').toLocaleDateString('id-ID', {month: 'long', year: 'numeric'})}</p>
                                        </div>

                                        {/* Pengaturan Penandatangan (Ramping & Snug) */}
                                        {!isViewerMode && (
                                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 grid grid-cols-1 sm:grid-cols-3 gap-2.5 mb-4 print:hidden">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-0.5">Ditetapkan Di:</label>
                                                    <input type="text" value={establishedIn} onChange={(e)=>setEstablishedIn(e.target.value)} className="w-full px-2 py-1.5 rounded-lg bg-white border border-slate-200 outline-none text-xs font-semibold focus:border-amber-400"/>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-0.5">Nama Pembina:</label>
                                                    <input type="text" value={coachName} onChange={(e)=>setCoachName(e.target.value)} className="w-full px-2 py-1.5 rounded-lg bg-white border border-slate-200 outline-none text-xs font-semibold focus:border-amber-400"/>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-0.5">NIP (Opsional):</label>
                                                    <input type="text" value={coachNip} onChange={(e)=>setCoachNip(e.target.value)} className="w-full px-2 py-1.5 rounded-lg bg-white border border-slate-200 outline-none text-xs font-semibold focus:border-amber-400"/>
                                                </div>
                                            </div>
                                        )}

                                        {/* Tabel Rekap Kompresi Ramping */}
                                        <div className="overflow-x-auto border border-slate-200 rounded-xl print:border-none print:overflow-visible relative min-h-[150px]">
                                            {isLoadingData && (
                                                <div className="absolute inset-0 z-10 bg-white/70 backdrop-blur-xs flex items-center justify-center rounded-xl print:hidden">
                                                    <Loader2 className="w-8 h-8 text-amber-500 animate-spin" />
                                                </div>
                                            )}
                                            <table className="w-full text-left border-collapse print:border-black min-w-[450px]">
                                                <thead>
                                                    <tr className="bg-slate-100 print:bg-white text-slate-500 print:text-black uppercase text-[10px] font-bold tracking-wider">
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black w-10 text-center">No</th>
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black">Nama Siswa</th>
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black w-16 text-center">Kelas</th>
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black text-center w-10 text-green-600">H</th>
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black text-center w-10 text-blue-600">I</th>
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black text-center w-10 text-amber-500">S</th>
                                                        <th className="p-2 sm:p-3 border border-slate-200 print:border-black text-center w-10 text-red-600">A</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {!isLoadingData && students.length === 0 ? (
                                                        <tr><td colSpan="7" className="p-6 text-center text-slate-400 text-xs font-medium print:hidden">Belum ada data absensi untuk direkap.</td></tr>
                                                    ) : (
                                                        students.map((student, index) => {
                                                            const stats = getMonthlyStats(student.id, selectedMonth);
                                                            return (
                                                                <tr key={student.id} className="border-b border-slate-100 print:border-black">
                                                                    <td className="p-2 sm:p-3 text-center border border-slate-200 print:border-black font-bold text-xs">{index + 1}</td>
                                                                    <td className="p-2 sm:p-3 font-bold border border-slate-200 print:border-black text-slate-700 print:text-black text-xs sm:text-sm">{student.name}</td>
                                                                    <td className="p-2 sm:p-3 text-center border border-slate-200 print:border-black font-bold text-slate-500 print:text-black text-xs">{student.kelas}</td>
                                                                    <td className="p-2 sm:p-3 text-center border border-slate-200 print:border-black font-extrabold text-green-600 print:text-black bg-green-50/20 print:bg-white text-xs">{stats.Hadir}</td>
                                                                    <td className="p-2 sm:p-3 text-center border border-slate-200 print:border-black font-extrabold text-blue-600 print:text-black bg-blue-50/20 print:bg-white text-xs">{stats.Izin}</td>
                                                                    <td className="p-2 sm:p-3 text-center border border-slate-200 print:border-black font-extrabold text-amber-600 print:text-black bg-amber-50/20 print:bg-white text-xs">{stats.Sakit}</td>
                                                                    <td className="p-2 sm:p-3 text-center border border-slate-200 print:border-black font-extrabold text-red-600 print:text-black bg-red-50/20 print:bg-white text-xs">{stats.Alpa}</td>
                                                                </tr>
                                                            )
                                                        })
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* Tanda Tangan Khusus Print */}
                                        <div className="hidden print:block mt-12 break-inside-avoid w-full">
                                            <div className="flex justify-end pr-12">
                                                <div className="text-center w-64 text-black">
                                                    <p className="text-xs font-medium mb-16">{establishedIn}, {formattedCurrentDate}</p>
                                                    <p className="text-xs font-bold underline mb-0.5 uppercase">{coachName}</p>
                                                    <p className="text-[10px] text-slate-700 font-semibold uppercase">Pembina Ekstrakurikuler</p>
                                                    {coachNip && <p className="text-[10px] text-slate-700 font-mono mt-0.5">NIP. {coachNip}</p>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'anggota' && !isViewerMode && (
                                    <div className="p-3 sm:p-8">
                                        <div className="flex flex-col gap-3 mb-4 pb-3 border-b border-slate-100">
                                            <div>
                                                <h3 className="text-sm sm:text-lg font-black text-slate-800 mb-0.5">Manajemen Anggota</h3>
                                                <p className="text-[10px] sm:text-xs text-slate-400 font-medium">Tambah, edit, hapus, atau impor via CSV.</p>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5">
                                                <button onClick={downloadTemplate} className="px-2.5 py-1.5 bg-white border border-slate-300 text-slate-700 font-bold rounded-lg shadow-xs flex items-center gap-1 hover:bg-slate-50 text-[10px] sm:text-xs">
                                                    <Download className="w-3.5 h-3.5 text-green-600" /> Template
                                                </button>
                                                <label className="px-2.5 py-1.5 bg-green-500 text-white font-bold rounded-lg shadow-xs cursor-pointer hover:bg-green-600 flex items-center gap-1 text-[10px] sm:text-xs">
                                                    <Upload className="w-3.5 h-3.5" /> Impor CSV
                                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                                </label>
                                                <button onClick={() => setShowHapusSemuaWarning(true)} className="px-2.5 py-1.5 bg-red-50 border border-red-200 text-red-600 font-bold rounded-lg shadow-xs hover:bg-red-100 flex items-center gap-1 text-[10px] sm:text-xs">
                                                    <Trash2 className="w-3.5 h-3.5" /> Bersihkan
                                                </button>
                                            </div>
                                        </div>

                                        {showHapusSemuaWarning && (
                                            <div className="mb-4 bg-red-50 border border-red-200 p-3 rounded-xl flex flex-col gap-2">
                                                <div>
                                                    <h4 className="text-red-800 font-bold text-xs">Hapus Semua Data?</h4>
                                                    <p className="text-red-600 text-[10px]">Tindakan ini permanen dan tidak dapat dibatalkan.</p>
                                                </div>
                                                <div className="flex gap-1.5">
                                                    <button onClick={() => setShowHapusSemuaWarning(false)} className="px-3 py-1 bg-white text-slate-700 font-bold text-[10px] sm:text-xs rounded-lg border border-slate-200">Batal</button>
                                                    <button onClick={handleHapusAll} className="px-3 py-1 bg-red-600 text-white font-bold text-[10px] sm:text-xs rounded-lg">Hapus</button>
                                                </div>
                                            </div>
                                        )}

                                        {/* Form Tambah Manual Ramping */}
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-4 flex flex-col sm:flex-row gap-2 shadow-inner">
                                            <input 
                                                type="text" placeholder="Nama Lengkap Siswa..." 
                                                value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} 
                                                className="flex-[2] px-3 py-1.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-amber-500 font-semibold text-xs"
                                            />
                                            <input 
                                                type="text" placeholder="Kelas (cth: VII-A)" 
                                                value={newStudentKelas} onChange={(e) => setNewStudentKelas(e.target.value)} 
                                                className="flex-1 px-3 py-1.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-amber-500 font-semibold text-xs"
                                            />
                                            <button onClick={handleAddManual} className="px-4 py-1.5 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 text-xs shrink-0">
                                                Tambah
                                            </button>
                                        </div>

                                        {/* Tabel Siswa Ramping */}
                                        <div className="overflow-x-auto border border-slate-100 rounded-xl relative min-h-[150px]">
                                            {isLoadingData && (
                                                <div className="absolute inset-0 z-10 bg-white/70 backdrop-blur-xs flex items-center justify-center rounded-xl">
                                                    <Loader2 className="w-8 h-8 text-amber-500 animate-spin" />
                                                </div>
                                            )}
                                            <table className="w-full text-left border-collapse min-w-[400px]">
                                                <thead>
                                                    <tr className="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold tracking-wider">
                                                        <th className="p-2 sm:p-3 border-b border-slate-100 w-10 text-center">No</th>
                                                        <th className="p-2 sm:p-3 border-b border-slate-100">Nama Lengkap</th>
                                                        <th className="p-2 sm:p-3 border-b border-slate-100 w-20 text-center">Kelas</th>
                                                        <th className="p-2 sm:p-3 border-b border-slate-100 w-24 text-center">Aksi</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {!isLoadingData && students.length === 0 ? (
                                                        <tr><td colSpan="4" className="p-6 text-center text-slate-400 text-xs font-medium">Belum ada data anggota.</td></tr>
                                                    ) : (
                                                        students.map((student, index) => (
                                                            <tr key={student.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                                <td className="p-2 sm:p-3 text-center text-slate-400 font-bold text-xs">{index + 1}</td>
                                                                <td className="p-2 sm:p-3">
                                                                    {editingId === student.id ? (
                                                                        <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="w-full px-2 py-1 border border-amber-400 rounded-md outline-none font-bold text-xs" />
                                                                    ) : (
                                                                        <span className="font-bold text-slate-700 text-xs sm:text-sm">{student.name}</span>
                                                                    )}
                                                                </td>
                                                                <td className="p-2 sm:p-3 text-center">
                                                                    {editingId === student.id ? (
                                                                        <input type="text" value={editKelas} onChange={(e) => setEditKelas(e.target.value)} className="w-full px-1 py-1 border border-amber-400 rounded-md outline-none font-bold text-center text-xs" />
                                                                    ) : (
                                                                        <span className="font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md text-xs border border-slate-200">{student.kelas}</span>
                                                                    )}
                                                                </td>
                                                                <td className="p-2 sm:p-3 text-center">
                                                                    <div className="flex justify-center gap-1">
                                                                        {editingId === student.id ? (
                                                                            <>
                                                                                <button onClick={() => handleSaveEdit(student.id)} className="p-1.5 bg-green-100 text-green-700 rounded-md hover:bg-green-200" title="Simpan"><CheckCircle className="w-4 h-4"/></button>
                                                                                <button onClick={() => setEditingId(null)} className="p-1.5 bg-slate-100 text-slate-600 rounded-md hover:bg-slate-200" title="Batal"><X className="w-4 h-4"/></button>
                                                                            </>
                                                                        ) : (
                                                                            <>
                                                                                <button onClick={() => { setEditingId(student.id); setEditName(student.name); setEditKelas(student.kelas); }} className="p-1.5 bg-blue-50 text-blue-600 rounded-md hover:bg-blue-100" title="Edit"><Edit2 className="w-4 h-4"/></button>
                                                                                <button onClick={() => handleHapusSiswa(student.id)} className="p-1.5 bg-red-50 text-red-600 rounded-md hover:bg-red-100" title="Hapus"><Trash2 className="w-4 h-4"/></button>
                                                                            </>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                            </div>
                        </main>

                        <footer className="mt-8 py-4 text-center print:hidden bg-slate-900 border-t border-amber-500/20 w-full rounded-2xl shadow-md">
                            <p className="text-[10px] sm:text-xs font-semibold text-amber-400 tracking-wider font-mono uppercase px-2 leading-relaxed">
                                Aplikasi Absensi Digital dikembangkan oleh <br className="sm:hidden" /> <span className="font-black text-yellow-300 underline decoration-amber-500 underline-offset-2">ALFIAN</span> - Guru Bimbingan Konseling
                            </p>
                        </footer>

                    </div>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
